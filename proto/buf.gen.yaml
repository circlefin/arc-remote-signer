version: v2

managed:
  enabled: false

plugins:
  - local: protoc-gen-go
    out: .
    opt:
      - paths=import
      - module=github.com/circlefin/arc-remote-signer/proto
  - local: protoc-gen-go-grpc
    out: .
    opt:
      - paths=import
      - module=github.com/circlefin/arc-remote-signer/proto
