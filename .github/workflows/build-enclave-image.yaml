name: Build Docker

on:
  workflow_call:
    outputs:
      image:
        description: Full Cloudsmith image reference (registry/repo/name)
        value: ${{ jobs.build.outputs.image }}
      version:
        description: Pushed image version (tag without leading v)
        value: ${{ jobs.build.outputs.version }}
      digest:
        description: Registry digest of the pushed image
        value: ${{ jobs.build.outputs.digest }}
    inputs:
      push:
        type: boolean
        default: false
      cloudsmith_repo:
        type: string
        default: circle/arc-network
      runner:
        type: string
        default: ubuntu-latest
      enclave_artifact_name:
        type: string
        required: true
      enclave_file:
        type: string
        required: true
      enclave_pcr0:
        type: string
        required: true
      enclave_pcr1:
        type: string
        required: true
      enclave_pcr2:
        type: string
        required: true
      version:
        description: Image version tag (e.g. 1.3.0). Required when push is true.
        type: string
        default: ""

env:
  REGISTRY: docker.cloudsmith.io
  IMAGE_NAME: arc-remote-signer

jobs:
  build:
    name: Build signer-with-enclave
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ${{ inputs.runner }}
    outputs:
      image: ${{ steps.push.outputs.image }}
      version: ${{ steps.push.outputs.version }}
      digest: ${{ steps.push.outputs.digest }}
    env:
      CLOUDSMITH_REPO: ${{ inputs.cloudsmith_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download EIF artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: ${{ inputs.enclave_artifact_name }}
          path: artifacts/${{ inputs.enclave_artifact_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        id: build
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          files: docker-bake.hcl
          targets: signer-with-enclave
          set: |
            signer-with-enclave.platform=linux/amd64
            signer-with-enclave.tags=
            signer-with-enclave.output=type=oci,tar=false,dest=./oci-image
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          CI: true
          ENCLAVE_EIF: artifacts/${{ inputs.enclave_artifact_name }}/${{ inputs.enclave_file }}
          ENCLAVE_PCR0: ${{ inputs.enclave_pcr0 }}
          ENCLAVE_PCR1: ${{ inputs.enclave_pcr1 }}
          ENCLAVE_PCR2: ${{ inputs.enclave_pcr2 }}

      - name: Trivy vulnerability scan
        env:
          TRIVY_IMAGE: aquasec/trivy:0.71.2@sha256:f5d0e600ecda7449e2a9b272805aef698631d3bb3f3a739a750de2c6819acdc9
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${TRIVY_IMAGE}" image \
              --input /workspace/oci-image \
              --format sarif \
              --output /workspace/trivy-results.sarif \
              --severity CRITICAL \
              --ignore-unfixed \
              --exit-code 1

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-signer-with-enclave
          path: trivy-results.sarif

      - name: Login to Cloudsmith
        if: ${{ inputs.push }}
        uses: ./.github/actions/cloudsmith-login
        with:
          registry: ${{ env.REGISTRY }}

      - name: Push image
        id: push
        if: ${{ inputs.push }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.CLOUDSMITH_REPO }}/${{ env.IMAGE_NAME }}
          BAKE_METADATA: ${{ steps.build.outputs.metadata }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -z "${INPUT_VERSION}" ]; then
            echo "::error::inputs.version is required when push is true"
            exit 1
          fi
          VERSION="${INPUT_VERSION#v}"
          DIGEST=$(echo "${BAKE_METADATA}" | jq -r '.["signer-with-enclave"]."containerimage.digest"')
          if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then
            echo "::error::Failed to extract digest from build metadata"
            exit 1
          fi

          skopeo copy "oci:./oci-image" "docker://${IMAGE}:${VERSION}" --digestfile /tmp/push-digest
          skopeo copy "oci:./oci-image" "docker://${IMAGE}:${VERSION}-${GITHUB_SHA::8}"

          REGISTRY_DIGEST=$(cat /tmp/push-digest)
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "digest=${REGISTRY_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        if: ${{ inputs.push }}
        continue-on-error: true
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.CLOUDSMITH_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          artifact-name: sbom-signer-with-enclave.spdx.json
          output-file: sbom-signer-with-enclave.spdx.json
          upload-release-assets: false

      - name: Attest build provenance
        if: ${{ inputs.push }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.CLOUDSMITH_REPO }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: ${{ inputs.push }}
        uses: actions/attest-sbom@07e74fc4e78d1aad915e867f9a094073a9f71527 # v4.0.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.CLOUDSMITH_REPO }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-signer-with-enclave.spdx.json
          push-to-registry: true
